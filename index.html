<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS 互動式字彙考題 (1-100 題)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#2563eb', secondary: '#10b981', alert: '#ef4444' }
                }
            }
        }
    </script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .font-serif-en { font-family: 'Georgia', 'Merriweather', serif; }
        .font-mono-kk { font-family: 'Courier New', monospace; }
        /* 自訂捲軸 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">

    <div id="app" class="flex flex-col md:flex-row h-screen overflow-hidden">
        
        <!-- 左側選單 -->
        <aside class="w-full md:w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col flex-shrink-0 transition-all">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h1 class="text-xl font-bold text-primary dark:text-blue-400">IELTS Vocab</h1>
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-500 text-2xl">☰</button>
            </div>
            <div id="sidebar-menu" class="hidden md:flex flex-col overflow-y-auto flex-1 p-4 space-y-4">
                <div>
                    <button onclick="switchMode('ALL')" id="btn-mode-all" class="w-full text-left font-bold p-2 rounded bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200">
                        📚 全部題目 (1-100)
                    </button>
                </div>
                <div>
                    <button onclick="switchMode('MISTAKES')" id="btn-mode-mistakes" class="w-full text-left font-bold p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700">
                        ❌ 我的錯題本 (<span id="mistake-count">0</span>)
                    </button>
                </div>
                <hr class="border-gray-200 dark:border-gray-700">
                <div>
                    <h3 class="text-xs uppercase text-gray-500 font-semibold mb-2">學習進度</h3>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 dark:bg-gray-700 mb-1">
                        <div id="progress-bar-fill" class="bg-primary h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <p class="text-sm text-gray-600 dark:text-gray-400">答題進度: <span id="progress-text">0/100</span></p>
                    <p class="text-sm text-gray-600 dark:text-gray-400">答對率: <span id="accuracy-text">0%</span></p>
                </div>
            </div>
        </aside>

        <!-- 主內容區 -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
            
            <!-- 頂部控制列 -->
            <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-4 flex flex-wrap justify-between items-center gap-2 flex-shrink-0">
                <div class="flex items-center gap-2">
                    <span class="font-bold text-lg text-gray-700 dark:text-gray-200" id="header-title">Question 1</span>
                    <span id="badge-type" class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded dark:bg-blue-900 dark:text-blue-200">MC</span>
                    <span id="badge-category" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded dark:bg-gray-700 dark:text-gray-300">Category</span>
                </div>
                <div class="flex items-center gap-3">
                    <select id="setting-accent" onchange="updateSettings()" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded focus:ring-blue-500 p-1 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                        <option value="en-US">🇺🇸 美音</option>
                        <option value="en-GB">🇬🇧 英音</option>
                    </select>
                    <select id="setting-speed" onchange="updateSettings()" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded focus:ring-blue-500 p-1 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                        <option value="0.7">🐢 慢速</option>
                        <option value="0.9" selected>🚶 正常</option>
                        <option value="1.0">🏃 原速</option>
                    </select>
                    <button onclick="toggleDarkMode()" class="text-xl p-1 hover:bg-gray-200 dark:hover:bg-gray-700 rounded" title="切換深淺色">🌓</button>
                </div>
            </header>

            <!-- 考題與解析區 -->
            <div id="quiz-scroll-area" class="flex-1 overflow-y-auto p-4 md:p-8 bg-gray-50 dark:bg-gray-900 pb-24">
                <div class="max-w-3xl mx-auto space-y-6">
                    
                    <!-- 題目卡片 -->
                    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                        <div class="flex items-start gap-3">
                            <button onclick="speakCurrentQuestion()" class="text-2xl mt-1 hover:scale-110 transition-transform">🔊</button>
                            <div>
                                <h2 id="q-en" class="text-2xl font-serif-en font-medium text-gray-900 dark:text-white leading-relaxed"></h2>
                                <p id="q-zh" class="text-gray-500 dark:text-gray-400 mt-2"></p>
                            </div>
                        </div>

                        <!-- 互動選項區 -->
                        <div id="options-container" class="mt-6 space-y-3">
                            <!-- JS 動態生成 -->
                        </div>
                        
                        <div class="mt-6">
                            <button id="btn-submit" onclick="submitAnswer()" class="w-full md:w-auto bg-primary hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow transition-colors">
                                提交答案
                            </button>
                        </div>
                    </div>

                    <!-- 解析卡片 (預設隱藏) -->
                    <div id="explanation-card" class="hidden bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                        <div id="result-banner" class="flex items-center gap-2 font-bold text-lg mb-4">
                            <!-- 對錯結果 -->
                        </div>
                        <div class="space-y-4">
                            <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded border border-gray-100 dark:border-gray-600">
                                <h4 class="font-bold text-gray-700 dark:text-gray-200">💡 解答解析</h4>
                                <p id="exp-text" class="text-gray-600 dark:text-gray-300 mt-1"></p>
                            </div>
                            
                            <div id="vocab-section" class="space-y-4 mt-4">
                                <!-- 單字解析動態生成 -->
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 底部控制列 -->
            <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 p-4 flex justify-center gap-4 absolute bottom-0 w-full z-10">
                <button onclick="prevQuestion()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600 transition-colors">上一題</button>
                <button onclick="randomQuestion()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600 transition-colors hidden md:block">隨機跳題</button>
                <button onclick="resetProgress()" class="px-4 py-2 bg-red-100 text-red-700 rounded hover:bg-red-200 dark:bg-red-900 dark:text-red-200 dark:hover:bg-red-800 transition-colors hidden md:block">重置成績</button>
                <button onclick="nextQuestion()" class="px-4 py-2 bg-primary text-white rounded hover:bg-blue-700 transition-colors">下一題</button>
            </footer>

        </main>
    </div>

    <script>
        // ================= 資料區：1-35 題 =================
        const questionsData = [
            {
                id: 1, type: "MC", category: "Addition, equation & conclusion", source_page: 1,
                question_en: "Tourism brings much-needed money to developing countries. __________, it provides employment for the local population.",
                question_zh: "旅遊業為開發中國家帶來了急需的資金。__________，它也為當地人口提供了就業機會。",
                options: [
                    { label: "A", text: "Furthermore", kk: "[ˋfɝðɚˏmor]" },
                    { label: "B", text: "Similarly", kk: "[ˋsɪməlɚlɪ]" },
                    { label: "C", text: "Therefore", kk: "[ˋðɛrˏfor]" },
                    { label: "D", text: "Nevertheless", kk: "[ˏnɛvɚðəˋlɛs]" }
                ],
                answer: "A", answer_explanation_zh: "furthermore (此外) 用於補充說明，符合前後兩句「帶來資金」與「提供就業」的正面遞進關係。",
                key_vocabulary: [{
                    word: "furthermore", kk: "[ˋfɝðɚˏmor]", ipa: "/ˌfɜːðəˈmɔː/", part_of_speech: "adv.", meaning_zh: "此外；而且",
                    phrase_examples: [
                        { en: "The house is beautiful, and furthermore, it's in a great location.", zh: "這間房子很美，此外，它的地段也很好。" },
                        { en: "He said he had not been involved, and furthermore, he had an alibi.", zh: "他說他沒有參與，而且他有不在場證明。" }
                    ],
                    collocations: ["and furthermore", "furthermore it is..."], synonyms: ["moreover", "in addition", "besides"]
                }],
                ielts_tip_zh: "在 Writing Task 2 中，使用 furthermore 可以有效地連接支持論點，展現連貫性與高階語彙能力。"
            },
            {
                id: 2, type: "FILL", category: "Around the world", source_page: 2,
                question_en: "Japan, Korea and Taiwan are all in ________.",
                question_zh: "日本、韓國和台灣都位於________。",
                options: [
                    { label: "the Near East", text: "近東" },
                    { label: "the Middle East", text: "中東" },
                    { label: "the Far East", text: "遠東" },
                    { label: "Australasia", text: "大洋洲" }
                ],
                answer: "the Far East", answer_explanation_zh: "東亞國家（如日、韓、台）在地理與文化區分上被稱為 the Far East（遠東）。",
                key_vocabulary: [{
                    word: "the Far East", kk: "[ðə fɑr ist]", ipa: "/ðə fɑːr iːst/", part_of_speech: "n.", meaning_zh: "遠東（指東亞與東南亞國家）",
                    phrase_examples: [
                        { en: "He exports machinery to the Far East.", zh: "他將機械出口到遠東地區。" },
                        { en: "The company trades primarily in the Far East.", zh: "該公司主要在遠東進行貿易。" }
                    ],
                    collocations: ["travel to the Far East", "markets in the Far East"], synonyms: ["East Asia"]
                }],
                ielts_tip_zh: "IELTS 聽力或閱讀常出現區域地理名詞，需熟悉這些地區涵蓋的國家範圍。"
            },
            {
                id: 3, type: "MC", category: "Changes 1", source_page: 3,
                question_en: "For the first four months, visitor numbers to the town ________, but then dropped sharply in the final month.",
                question_zh: "在前四個月裡，該鎮的遊客數量________，但在最後一個月急劇下降。",
                options: [
                    { label: "A", text: "remained constant", kk: "[rɪˋmend ˋkɑnstənt]" },
                    { label: "B", text: "fluctuated", kk: "[ˋflʌktʃʊˏetɪd]" },
                    { label: "C", text: "peaked", kk: "[pikt]" },
                    { label: "D", text: "declined", kk: "[dɪˋklaɪnd]" }
                ],
                answer: "B", answer_explanation_zh: "fluctuate (波動) 代表數據上下起伏，常用於描述圖表中不穩定的趨勢。",
                key_vocabulary: [{
                    word: "fluctuate", kk: "[ˋflʌktʃʊˏet]", ipa: "/ˈflʌktʃueɪt/", part_of_speech: "v.", meaning_zh: "波動；起伏不定",
                    phrase_examples: [
                        { en: "Vegetable prices fluctuate according to the season.", zh: "蔬菜價格隨季節波動。" },
                        { en: "His mood fluctuates wildly from day to day.", zh: "他的情緒每天起伏很大。" }
                    ],
                    collocations: ["fluctuate wildly", "fluctuate between"], synonyms: ["vary", "swing", "change"]
                }],
                ielts_tip_zh: "Writing Task 1 描寫圖表必備動詞，形容數據時高時低。"
            },
            {
                id: 4, type: "TF", category: "Changes 2", source_page: 5,
                question_en: "The weather deteriorate rapidly when it started raining and the winds picked up.",
                question_zh: "開始下雨且風勢增強時，天氣迅速惡化。（請判斷「deteriorate」的時態用法是否正確）",
                options: [
                    { label: "True", text: "用法正確" },
                    { label: "False", text: "用法錯誤" }
                ],
                answer: "False", answer_explanation_zh: "因為後半句為過去式 'started raining'，此處應使用過去式 'deteriorated'。",
                key_vocabulary: [{
                    word: "deteriorate", kk: "[dɪˋtɪrɪəˏret]", ipa: "/dɪˈtɪəriəreɪt/", part_of_speech: "v.", meaning_zh: "惡化",
                    phrase_examples: [
                        { en: "Her health deteriorated rapidly, and she died shortly afterwards.", zh: "她的健康狀況迅速惡化，不久便過世了。" },
                        { en: "Relations between the two countries have deteriorated sharply.", zh: "兩國關係急劇惡化。" }
                    ],
                    collocations: ["deteriorate rapidly", "condition deteriorates"], synonyms: ["worsen", "decline"]
                }],
                ielts_tip_zh: "常出現於描述環境、健康或經濟變差的文章中；寫作時注意時態一致性。"
            },
            {
                id: 5, type: "FILL", category: "Condition", source_page: 7,
                question_en: "You can borrow my dictionary ________ you return it before you go home.",
                question_zh: "你可以借我的字典，________你回家前歸還。",
                options: [
                    { label: "providing that", text: "只要；條件是" },
                    { label: "unless", text: "除非" },
                    { label: "no matter how", text: "無論如何" },
                    { label: "wherever", text: "無論何地" }
                ],
                answer: "providing that", answer_explanation_zh: "providing that (條件是；只要) 引導條件子句，等同於 as long as。",
                key_vocabulary: [{
                    word: "providing that", kk: "[prəˋvaɪdɪŋ ðæt]", ipa: "/prəˈvaɪdɪŋ ðæt/", part_of_speech: "conj.", meaning_zh: "只要；條件是",
                    phrase_examples: [
                        { en: "You can go out providing that you finish your homework first.", zh: "只要你先寫完作業就可以出去。" },
                        { en: "We'll be there at about 7.30, providing that there's a suitable train.", zh: "只要有合適的火車，我們大約七點半會到。" }
                    ],
                    collocations: ["providing that you...", "providing (that)"], synonyms: ["provided that", "as long as", "on condition that"]
                }],
                ielts_tip_zh: "Writing Task 2 中可用來取代 if 或 as long as，增加句型多樣性。"
            },
            {
                id: 6, type: "MC", category: "Confusing words & false friends 1", source_page: 8,
                question_en: "Widening the road made an ________ difference to the flow of traffic.",
                question_zh: "拓寬道路對車流產生了________（顯著的）差異。",
                options: [
                    { label: "A", text: "appreciative", kk: "[əˋpriʃɪətɪv]" },
                    { label: "B", text: "appreciable", kk: "[əˋpriʃɪəb!]" },
                    { label: "C", text: "appreciated", kk: "[əˋpriʃɪˏetɪd]" },
                    { label: "D", text: "approachable", kk: "[əˋprotʃəb!]" }
                ],
                answer: "B", answer_explanation_zh: "appreciable 指「明顯的、可察覺的」；而 appreciative 意為「感激的、有鑑賞力的」，兩者易混淆。",
                key_vocabulary: [{
                    word: "appreciable", kk: "[əˋpriʃɪəb!]", ipa: "/əˈpriːʃəbl/", part_of_speech: "adj.", meaning_zh: "明顯的；可察覺的",
                    phrase_examples: [
                        { en: "There has been no appreciable change in the patient's condition.", zh: "病人的情況沒有明顯的改變。" },
                        { en: "The new rules will make an appreciable difference to our working lives.", zh: "新規定將對我們的工作生活產生顯著的影響。" }
                    ],
                    collocations: ["appreciable difference", "appreciable effect"], synonyms: ["significant", "noticeable", "considerable"]
                }],
                ielts_tip_zh: "搭配詞 appreciable difference 是學術寫作極佳的詞彙組合。"
            },
            {
                id: 7, type: "MC", category: "Confusing words & false friends 1", source_page: 9,
                question_en: "The ________ noise from the new motorway has forced many people to move.",
                question_zh: "新高速公路________（不斷持續）的噪音迫使許多人搬家。",
                options: [
                    { label: "A", text: "continual", kk: "[kənˋtɪnjʊəl]" },
                    { label: "B", text: "continuous", kk: "[kənˋtɪnjʊəs]" },
                    { label: "C", text: "continued", kk: "[kənˋtɪnjʊd]" },
                    { label: "D", text: "continuing", kk: "[kənˋtɪnjʊɪŋ]" }
                ],
                answer: "B", answer_explanation_zh: "continuous 指「連續不斷、無中斷的」噪音；continual 則指「頻繁發生但有間斷的」。物理噪音持續無間斷用 continuous。",
                key_vocabulary: [{
                    word: "continuous", kk: "[kənˋtɪnjʊəs]", ipa: "/kənˈtɪnjuəs/", part_of_speech: "adj.", meaning_zh: "連續不斷的",
                    phrase_examples: [
                        { en: "It rained continuously all day.", zh: "雨連續下了一整天。" },
                        { en: "The brain needs a continuous supply of blood.", zh: "大腦需要持續不斷的血液供應。" }
                    ],
                    collocations: ["continuous process", "continuous improvement"], synonyms: ["uninterrupted", "constant", "ceaseless"]
                }],
                ielts_tip_zh: "區分 continual (頻繁的) 與 continuous (不間斷的) 是高分關鍵。"
            },
            {
                id: 8, type: "TF", category: "Confusing words & false friends 2", source_page: 11,
                question_en: "As inflation spiralled out of control, paper money suddenly became almost priceless.",
                question_zh: "隨著通貨膨脹失控，紙鈔突然變得幾乎「無價(priceless)」。(判斷用字是否符合邏輯)",
                options: [
                    { label: "True", text: "用法正確" },
                    { label: "False", text: "用法錯誤" }
                ],
                answer: "False", answer_explanation_zh: "priceless 意為「極其珍貴的、無價的」；此處紙幣失去購買力，應使用 worthless (毫無價值的)。",
                key_vocabulary: [{
                    word: "worthless", kk: "[ˋwɝθlɪs]", ipa: "/ˈwɜːθləs/", part_of_speech: "adj.", meaning_zh: "毫無價值的",
                    phrase_examples: [
                        { en: "The company's shares are now virtually worthless.", zh: "該公司的股票現在幾乎一文不值。" },
                        { en: "He gave me a piece of advice that was completely worthless.", zh: "他給了我一個毫無價值的建議。" }
                    ],
                    collocations: ["virtually worthless", "completely worthless"], synonyms: ["valueless", "useless"]
                }],
                ielts_tip_zh: "閱讀測驗常利用 priceless 與 worthless 的反差來設計陷阱題。"
            },
            {
                id: 9, type: "FILL", category: "Context & meaning 1", source_page: 12,
                question_en: "He was an extremely ________ author, writing three or four novels a year as well as many short stories.",
                question_zh: "他是一位極其________的作家，一年寫三四本小說以及許多短篇故事。",
                options: [
                    { label: "prolific", text: "多產的" },
                    { label: "elusive", text: "難以捉摸的" },
                    { label: "exhaustive", text: "詳盡的" },
                    { label: "resilient", text: "有彈性的" }
                ],
                answer: "prolific", answer_explanation_zh: "根據上下文「一年寫三四本小說」，推斷出該作家非常「多產的」(prolific)。",
                key_vocabulary: [{
                    word: "prolific", kk: "[prəˋlɪfɪk]", ipa: "/prəˈlɪfɪk/", part_of_speech: "adj.", meaning_zh: "多產的；作品豐富的",
                    phrase_examples: [
                        { en: "Picasso was a prolific artist.", zh: "畢卡索是一位多產的藝術家。" },
                        { en: "Rabbits are prolific breeders.", zh: "兔子繁殖力極強。" }
                    ],
                    collocations: ["prolific writer", "prolific author"], synonyms: ["productive", "creative", "fertile"]
                }],
                ielts_tip_zh: "常用於描述作家、藝術家或科學家的成就，是極具學術感的讚美詞彙。"
            },
            {
                id: 10, type: "MATCH", category: "Context & meaning 2", source_page: 14,
                question_en: "Select the correct definition for the word: integrate",
                question_zh: "請選擇單字「integrate」的正確定義：",
                options: [
                    { label: "A", text: "To help someone or something" },
                    { label: "B", text: "To become a full member of a group or society" },
                    { label: "C", text: "To risk damaging or destroying something" },
                    { label: "D", text: "To spread ideas to a lot of people" }
                ],
                answer: "B", answer_explanation_zh: "integrate 的意思是「融入；整合」，在社會學背景下意指成為群體或社會的充分一員 (become a full member)。",
                key_vocabulary: [{
                    word: "integrate", kk: "[ˋɪntəˏgret]", ipa: "/ˈɪntɪɡreɪt/", part_of_speech: "v.", meaning_zh: "融入；整合",
                    phrase_examples: [

        function initApp() {
            // 讀取本地主題偏好 (如果有)
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                settings.dark = true;
                document.documentElement.classList.add('dark');
            }
            renderSidebar();
            renderQuestion();
        }

        function updateSettings() {
            settings.accent = document.getElementById('setting-accent').value;
            settings.rate = parseFloat(document.getElementById('setting-speed').value);
        }

        function toggleDarkMode() {
            settings.dark = !settings.dark;
            if (settings.dark) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('sidebar-menu');
            menu.classList.toggle('hidden');
        }

        function switchMode(mode) {
            state.mode = mode;
            if (mode === 'MISTAKES') {
                activeQuestions = questionsData.filter(q => state.mistakes.has(q.id));
                if (activeQuestions.length === 0) {
                    alert('目前沒有錯題！繼續保持！');
                    switchMode('ALL');
                    return;
                }
            } else {
                activeQuestions = questionsData;
            }
            state.currentIndex = 0;
            renderSidebar();
            renderQuestion();
        }

        function renderSidebar() {
            const btnAll = document.getElementById('btn-mode-all');
            const btnMistakes = document.getElementById('btn-mode-mistakes');
            
            if (state.mode === 'ALL') {
                btnAll.className = "w-full text-left font-bold p-2 rounded bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200";
                btnMistakes.className = "w-full text-left font-bold p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700";
            } else {
                btnAll.className = "w-full text-left font-bold p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700";
                btnMistakes.className = "w-full text-left font-bold p-2 rounded bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200";
            }

            document.getElementById('mistake-count').innerText = state.mistakes.size;

            // 計算進度
            const total = activeQuestions.length;
            let answeredCount = 0;
            let correctCount = 0;

            activeQuestions.forEach(q => {
                if (state.answers[q.id]) {
                    answeredCount++;
                    if (state.answers[q.id].isCorrect) correctCount++;
                }
            });

            const accuracy = answeredCount === 0 ? 0 : Math.round((correctCount / answeredCount) * 100);
            const progressPercent = total === 0 ? 0 : (answeredCount / total) * 100;

            document.getElementById('progress-bar-fill').style.width = `${progressPercent}%`;
            document.getElementById('progress-text').innerText = `${answeredCount}/${total}`;
            document.getElementById('accuracy-text').innerText = `${accuracy}%`;
        }

        function renderQuestion() {
            if (activeQuestions.length === 0) return;

            const q = activeQuestions[state.currentIndex];
            state.selectedOption = null;
            state.submitted = !!state.answers[q.id];

            // 頂部狀態更新
            document.getElementById('header-title').innerText = `Question ${state.currentIndex + 1} of ${activeQuestions.length}`;
            document.getElementById('badge-type').innerText = q.type;
            document.getElementById('badge-category').innerText = q.category;

            // 題目本體
            document.getElementById('q-en').innerHTML = formatQuestionEn(q.question_en);
            document.getElementById('q-zh').innerText = q.question_zh;

            // 選項區
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';

            if (q.type === 'WORD_FORM') {
                const val = state.submitted ? state.answers[q.id].userAnswer : '';
                const disabled = state.submitted ? 'disabled' : '';
                optsContainer.innerHTML = `
                    <input type="text" id="input-word" value="${val}" ${disabled}
                        class="w-full md:w-1/2 p-3 border rounded text-lg focus:ring-2 focus:ring-blue-500 outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                        placeholder="請輸入單字..." oninput="state.selectedOption = this.value">
                `;
            } else {
                // MC, TF, FILL, MATCH 皆轉化為按鈕選項
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = `w-full text-left p-4 rounded-lg border-2 transition-all flex flex-col md:flex-row md:items-center gap-2
                        ${state.submitted ? 'cursor-default' : 'cursor-pointer hover:border-blue-300 dark:hover:border-blue-600'}`;
                    
                    // 根據狀態設定顏色
                    if (state.submitted) {
                        const isSelected = state.answers[q.id].userAnswer === (opt.label === q.answer || opt.label.length > 1 ? opt.label : opt.label); 
                        // Note: For MC/MATCH it's label 'A', for FILL it's label text. 
                        const isCorrectOpt = (opt.label === q.answer || opt.label === q.answer); // Simplify
                        
                        let matchValue = q.type === 'FILL' ? opt.label : opt.label;
                        const isThisSelected = state.answers[q.id].userAnswer === matchValue;
                        const isThisCorrect = matchValue === q.answer;

                        if (isThisCorrect) {
                            btn.classList.add('bg-green-50', 'border-green-500', 'dark:bg-green-900/30');
                        } else if (isThisSelected && !isThisCorrect) {
                            btn.classList.add('bg-red-50', 'border-red-500', 'dark:bg-red-900/30');
                        } else {
                            btn.classList.add('bg-white', 'border-gray-200', 'dark:bg-gray-800', 'dark:border-gray-700');
                        }
                    } else {
                        btn.classList.add('bg-white', 'border-gray-200', 'dark:bg-gray-800', 'dark:border-gray-700');
                        btn.onclick = () => selectOption(opt.label, btn);
                    }

                    let optLabelHtml = q.type === 'MC' || q.type === 'MATCH' ? `<span class="font-bold text-lg min-w-[2rem]">${opt.label}.</span>` : '';
                    let kkHtml = opt.kk ? `<span class="text-sm font-mono-kk text-gray-500 dark:text-gray-400 ml-auto">${opt.kk}</span>` : '';
                    
                    btn.innerHTML = `${optLabelHtml} <span class="text-lg text-gray-800 dark:text-gray-200">${opt.text}</span> ${kkHtml}`;
                    optsContainer.appendChild(btn);
                });
            }

            // 按鈕與解析狀態
            const submitBtn = document.getElementById('btn-submit');
            const expCard = document.getElementById('explanation-card');
            
            if (state.submitted) {
                submitBtn.classList.add('hidden');
                expCard.classList.remove('hidden');
                renderExplanation(q);
            } else {
                submitBtn.classList.remove('hidden');
                expCard.classList.add('hidden');
            }

            // 回到頂部
            document.getElementById('quiz-scroll-area').scrollTop = 0;
        }

        function formatQuestionEn(text) {
            return text.replace(/_+/g, '<span class="text-blue-600 dark:text-blue-400 font-bold border-b-2 border-blue-600 dark:border-blue-400 px-2">______</span>');
        }

        function selectOption(val, btnElement) {
            if (state.submitted) return;
            state.selectedOption = val;
            
            const container = document.getElementById('options-container');
            Array.from(container.children).forEach(child => {
                child.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/30', 'dark:border-blue-500');
                child.classList.add('border-gray-200', 'dark:border-gray-700');
            });
            
            btnElement.classList.remove('border-gray-200', 'dark:border-gray-700');
            btnElement.classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/30', 'dark:border-blue-500');
        }

        function submitAnswer() {
            const q = activeQuestions[state.currentIndex];
            
            // WORD_FORM 特殊處理，抓取 input 值
            if (q.type === 'WORD_FORM') {
                const input = document.getElementById('input-word');
                if (input) state.selectedOption = input.value.trim().toLowerCase();
            }

            if (!state.selectedOption) {
                alert('請先選擇或輸入答案！');
                return;
            }

            const isCorrect = state.selectedOption === q.answer || (q.type === 'WORD_FORM' && state.selectedOption === q.answer.toLowerCase());
            
            state.answers[q.id] = {
                isCorrect: isCorrect,
                userAnswer: state.selectedOption
            };

            if (!isCorrect) {
                state.mistakes.add(q.id);
            } else {
                state.mistakes.delete(q.id);
            }

            state.submitted = true;
            renderSidebar();
            renderQuestion(); // 重新渲染以顯示對錯顏色和解析
        }

        function renderExplanation(q) {
            const isCorrect = state.answers[q.id].isCorrect;
            const resultBanner = document.getElementById('result-banner');
            
            if (isCorrect) {
                resultBanner.innerHTML = `<span class="text-2xl">✅</span> <span class="text-green-600 dark:text-green-400">答對了！</span>`;
            } else {
                resultBanner.innerHTML = `<span class="text-2xl">❌</span> <span class="text-red-600 dark:text-red-400">答錯了。正確答案是：${q.answer}</span>`;
            }

            document.getElementById('exp-text').innerText = q.answer_explanation_zh;

            const vocabSection = document.getElementById('vocab-section');
            vocabSection.innerHTML = '';

            q.key_vocabulary.forEach(v => {
                let examplesHtml = v.phrase_examples.map(ex => `
                    <div class="mt-2 pl-3 border-l-4 border-gray-200 dark:border-gray-600">
                        <p class="text-gray-800 dark:text-gray-200 font-serif-en">${ex.en} 
                            <button onclick="speakText('${ex.en.replace(/'/g, "\\'")}')" class="text-lg hover:scale-110 transition-transform ml-1">🔊</button>
                        </p>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">${ex.zh}</p>
                    </div>
                `).join('');

                let collHtml = v.collocations && v.collocations.length > 0 ? `<div class="mt-3 text-sm"><span class="font-bold text-gray-600 dark:text-gray-300">🔗 搭配詞：</span> <span class="text-gray-700 dark:text-gray-200">${v.collocations.join(', ')}</span></div>` : '';
                let synHtml = v.synonyms && v.synonyms.length > 0 ? `<div class="mt-1 text-sm"><span class="font-bold text-gray-600 dark:text-gray-300">🔄 同義字：</span> <span class="text-gray-700 dark:text-gray-200">${v.synonyms.join(', ')}</span></div>` : '';

                vocabSection.innerHTML += `
                    <div class="p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm">
                        <div class="flex items-end gap-3 mb-2 flex-wrap">
                            <h3 class="text-xl font-bold text-primary dark:text-blue-400">${v.word}</h3>
                            <button onclick="speakText('${v.word.replace(/'/g, "\\'")}')" class="text-xl hover:scale-110 transition-transform">🔊</button>
                            <span class="text-gray-500 font-mono-kk">${v.kk}</span>
                            <span class="text-gray-400 text-sm">IPA: ${v.ipa}</span>
                            <span class="px-2 py-0.5 bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300 text-xs rounded">${v.part_of_speech}</span>
                        </div>
                        <p class="text-gray-800 dark:text-gray-200 font-medium mb-3">${v.meaning_zh}</p>
                        ${examplesHtml}
                        ${collHtml}
                        ${synHtml}
                    </div>
                `;
            });

            if (q.ielts_tip_zh) {
                vocabSection.innerHTML += `
                    <div class="mt-4 p-3 bg-yellow-50 dark:bg-yellow-900/30 border border-yellow-200 dark:border-yellow-700/50 rounded flex gap-3 items-start">
                        <span class="text-xl">💡</span>
                        <p class="text-sm text-yellow-800 dark:text-yellow-200">${q.ielts_tip_zh}</p>
                    </div>
                `;
            }
        }

        // ================= 導航與功能 =================
        function nextQuestion() {
            if (state.currentIndex < activeQuestions.length - 1) {
                state.currentIndex++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (state.currentIndex > 0) {
                state.currentIndex--;
                renderQuestion();
            }
        }

        function randomQuestion() {
            state.currentIndex = Math.floor(Math.random() * activeQuestions.length);
            renderQuestion();
        }

        function resetProgress() {
            if(confirm('確定要清除所有答題紀錄嗎？')) {
                state.answers = {};
                state.mistakes.clear();
                if(state.mode === 'MISTAKES') switchMode('ALL');
                else {
                    state.currentIndex = 0;
                    renderSidebar();
                    renderQuestion();
                }
            }
        }

        // ================= 發音 API (Web Speech API) =================
        function speakCurrentQuestion() {
            const q = activeQuestions[state.currentIndex];
            // 把底線換成 "blank" 發音
            let textToSpeak = q.question_en.replace(/_+/g, " blank ");
            speakText(textToSpeak);
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = settings.accent; 
            utterance.rate = settings.rate;
            
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v => v.lang === utterance.lang && (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Aria')));
            if (preferred) utterance.voice = preferred;
            
            window.speechSynthesis.speak(utterance);
        }

        // 確保載入聲音
        window.speechSynthesis.onvoiceschanged = () => {};

    </script>
</body>
</html>
